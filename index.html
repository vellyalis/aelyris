<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether Terminal</title>
    <!--
      Inline transparency rule. WebView2 paints `body` opaque white by
      default, which means Tauri's transparent: true window + Mica
      effect get hidden under a white opaque layer for the few hundred
      ms before main.tsx and global.css land. Setting `background:
      transparent` here in head is what actually lets the OS Mica
      show through from the very first frame — without this rule the
      app was visually opaque even though Mica was being applied at
      the OS level.
    -->
    <style>
      html,
      body {
        background: transparent !important;
        margin: 0;
        padding: 0;
        height: 100%;
      }
      #root {
        background: transparent !important;
      }
      html[data-aether-host="browser"],
      html[data-aether-host="browser"] body {
        background:
          radial-gradient(ellipse at 22% 0%, rgba(73, 46, 130, 0.34), transparent 42%),
          radial-gradient(ellipse at 70% 100%, rgba(18, 62, 85, 0.24), transparent 46%),
          linear-gradient(180deg, #0f0b1d 0%, #090d15 62%, #07111a 100%) !important;
      }
      /* Splash fades out as soon as React commits its first
       * frame. main.tsx adds `data-react-mounted` to <html> in a
       * requestAnimationFrame after createRoot — at that point
       * the app's real chrome is already painted, so the splash
       * just needs to disappear, not be replaced visually. The
       * 220 ms ease keeps the swap subliminal instead of
       * flickering. */
      #splash {
        transition: opacity 220ms cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      html[data-react-mounted="true"] #splash {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Inline splash — visible until React hydrates -->
      <div id="splash" style="
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: transparent;
        color: rgba(255,255,255,0.5);
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        letter-spacing: 0.5px;
        user-select: none;
        -webkit-user-select: none;
      ">
        <div style="text-align:center;">
          <div style="font-size: 20px; font-weight: 600; color: #c8a050; margin-bottom: 8px;">Aether Terminal</div>
          <div style="opacity: 0.6;">Starting...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
