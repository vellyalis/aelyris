<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" style="background: #0B0B0E;">
  <defs>
    <!-- 輪郭を殺さず、ホワッとだけさせる上品なグロー -->
    <filter id="refined-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="sharp" />
      <feGaussianBlur stdDeviation="12" result="soft" />
      <feMerge>
        <feMergeNode in="soft" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- パステルの生命感：Gemini プリズム -->
    <linearGradient id="prism-vibrant" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7DD3FC" /> <!-- ブルー -->
      <stop offset="45%" stop-color="#6EE7B7" /> <!-- ミント -->
      <stop offset="85%" stop-color="#FDE047" /> <!-- イエロー -->
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- 軌道：パステルピンク 〜 ラベンダー -->
    <linearGradient id="gemini-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F9A8D4" stop-opacity="0" />
      <stop offset="50%" stop-color="#F9A8D4" />
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- ========================================== -->
  <!-- 1. 復活した「以前の外輪」 -->
  <!-- 繊細な多層リングに、微かなパステルの光彩を -->
  <!-- ========================================== -->
  <g opacity="0.7" filter="url(#refined-glow)">
    <circle cx="256" cy="256" r="225" fill="none" stroke="#F8FAFC" stroke-width="1.2" opacity="0.8" />
    <circle cx="256" cy="256" r="235" fill="none" stroke="#6EE7B7" stroke-width="0.5" opacity="0.4" />
    <circle cx="256" cy="256" r="215" fill="none" stroke="#F9A8D4" stroke-width="0.5" opacity="0.4" />
  </g>

  <!-- ========================================== -->
  <!-- 2. Aのシルエット (今の安定した形 ＋ はっきりした発色) -->
  <!-- ========================================== -->
  <g style="mix-blend-mode: screen;" filter="url(#refined-glow)">
    <!-- 左の柱 -->
    <path d="M 190 360 C 210 280, 240 180, 256 100 Q 235 180, 205 355 Z" fill="url(#prism-vibrant)" />
    <!-- 右の柱 -->
    <path d="M 322 360 C 302 280, 272 180, 256 100 Q 277 180, 307 355 Z" fill="url(#prism-vibrant)" />
  </g>

  <!-- ========================================== -->
  <!-- 3. 上品な軌道 (以前のクリアなラインへ) -->
  <!-- ========================================== -->
  <g filter="url(#refined-glow)">
    <path d="M 120 290 Q 256 170, 392 290" fill="none" stroke="url(#gemini-pink)" stroke-width="4" stroke-linecap="round" />
    <!-- 補助波（以前の科学的媒体） -->
    <path d="M 0 256 C 128 340, 384 170, 512 256" fill="none" stroke="#FFFFFF" stroke-width="0.3" opacity="0.2" />
  </g>

  <!-- ========================================== -->
  <!-- 4. 宝石・スターダスト・ぷっくり星 (今の最高のエッセンス) -->
  <!-- POPさと高級感を両立 -->
  <!-- ========================================== -->
  <g filter="url(#refined-glow)">
    <!-- 中央の核心（ぷっくり星） -->
    <path d="M 256 262 C 256 275, 262 280, 285 280 C 262 280, 256 285, 256 298 C 256 285, 250 280, 227 280 C 250 280, 256 275, 256 262 Z" fill="#FFFFFF" />
    
    <!-- 宝石が並ぶ横棒（POPな崩し） -->
    <circle cx="218" cy="280" r="3.5" fill="#7DD3FC" /> <!-- ブルー -->
    <circle cx="294" cy="280" r="3" fill="#F9A8D4" /> <!-- ピンク -->
    <circle cx="188" cy="280" r="2" fill="#6EE7B7" /> <!-- ミント -->
    <circle cx="324" cy="280" r="2" fill="#FDE047" /> <!-- イエロー -->

    <!-- 周辺のスターダスト -->
    <circle cx="160" cy="240" r="3" fill="#A7F3D0" /> 
    <circle cx="360" cy="330" r="2.5" fill="#FDE047" />
    <circle cx="310" cy="190" r="1.5" fill="#7DD3FC" />
    
    <!-- 頂点の特異点 -->
    <path d="M 256 85 C 256 95, 260 100, 272 100 C 260 100, 256 105, 256 115 C 256 105, 252 100, 240 100 C 252 100, 256 95, 256 85 Z" fill="#FFFFFF" />
  </g>

  <!-- 仕上げ：最前面の微細な光のミスト -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="0.2" opacity="0.1" />
</svg>