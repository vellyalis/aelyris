name: CI

# v2 policy (docs/specs/QUALITY_REMEDIATION_PLAN_2026-07-02.md S2):
# blocking = tsc + vitest + cargo test --lib + release hygiene + stack-risk
# classification; informational = biome/fmt/clippy/raw audits. The stack-risk
# CI gate accepts verified upstream-bound Tauri/urlpattern debt, but still
# fails on implementation-fixable release blockers or unclassified risks.
# Everything runs on windows-latest: pnpm scripts use cmd `set` syntax and the
# product (ConPTY, webview2-com, Win32 job objects) is Windows-targeted.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + vitest)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests (vitest, forks pool for CI stability)
        run: pnpm test -- --pool=forks
      - name: Biome lint (informational until repo-wide CRLF drift is settled)
        continue-on-error: true
        run: pnpm exec biome lint src

  rust:
    name: Rust (cargo test --lib)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Lib tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: rustfmt check (informational)
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Clippy (informational until proven green on a clean branch)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  release-hardening:
    name: Release hardening gates
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Release hygiene
        run: pnpm verify:release:hygiene
      - name: AI decision knowledge gate
        run: pnpm verify:ai-decision-knowledge
      - name: Differentiation polish spec gate
        run: pnpm verify:differentiation-polish-spec
      - name: Stack-risk classification gate
        run: node scripts\verify-stack-risk.mjs --allow-upstream-bound
      - name: Release quality score artifact
        run: pnpm verify:quality-score
      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: .codex-auto/quality/*.json
          if-no-files-found: warn

  audit:
    name: Dependency audits (informational)
    runs-on: windows-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: pnpm audit (prod)
        continue-on-error: true
        run: pnpm audit --prod
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        continue-on-error: true
        working-directory: src-tauri
        run: cargo audit
