name: CI

# v2 policy (docs/specs/QUALITY_REMEDIATION_PLAN_2026-07-02.md S2):
# blocking = tsc + vitest + cargo test --lib + release hygiene + stack-risk
# classification; informational = biome/fmt/clippy/raw audits. The stack-risk
# CI gate accepts verified upstream-bound Tauri/urlpattern debt, but still
# fails on implementation-fixable release blockers or unclassified risks.
# Everything runs on windows-latest: pnpm scripts use cmd `set` syntax and the
# product (ConPTY, webview2-com, Win32 job objects) is Windows-targeted.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_candidate:
        description: Run the fail-closed release evidence lane
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + vitest)
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests (vitest, forks pool for CI stability)
        run: pnpm test -- --pool=forks
      - name: Biome lint (informational until repo-wide CRLF drift is settled)
        continue-on-error: true
        run: pnpm exec biome lint src

  rust:
    name: Rust (cargo test --lib)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Lib tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: rustfmt check (informational)
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Clippy (informational until proven green on a clean branch)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  release-hardening:
    name: Release hardening gates
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install cargo-audit
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-audit
      - name: Release hygiene
        run: pnpm verify:release:hygiene
      - name: AI decision knowledge gate
        run: pnpm verify:ai-decision-knowledge
      - name: Differentiation polish spec gate
        run: pnpm verify:differentiation-polish-spec
      - name: Stack-risk classification gate
        run: node scripts\verify-stack-risk.mjs --allow-upstream-bound
      - name: Release quality score artifact
        run: pnpm verify:quality-score
      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-artifacts
          path: .codex-auto/quality/*.json
          if-no-files-found: warn

  audit:
    name: Dependency audits (informational)
    runs-on: windows-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: pnpm audit (prod)
        continue-on-error: true
        run: pnpm audit --prod
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2
        with:
          tool: cargo-audit
      - name: cargo audit
        continue-on-error: true
        working-directory: src-tauri
        run: cargo audit

  release-evidence:
    name: Release evidence (SBOM + provenance + enforce)
    if: github.event_name == 'workflow_dispatch' && inputs.release_candidate
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate source and dependency SBOM
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0.20.11
        with:
          path: .
          format: spdx-json
          output-file: .codex-auto/release-evidence/aelyris.spdx.json
          upload-artifact: false
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: .codex-auto/release-evidence/aelyris.spdx.json
      - name: Enforce release quality
        run: pnpm verify:quality-score:enforce
      - name: Upload immutable release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence-${{ github.sha }}
          path: |
            .codex-auto/release-evidence/aelyris.spdx.json
            .codex-auto/quality/*.json
          if-no-files-found: error
