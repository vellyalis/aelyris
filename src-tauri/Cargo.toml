[package]
name = "aether-terminal"
version = "0.1.0"
description = "Windows-native AI workspace terminal"
authors = ["vellyalis"]
edition = "2021"

[lib]
name = "aether_terminal_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri core
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# PTY (terminal backend)
portable-pty = "0.8"

# Git operations
git2 = "0.19"

# Config
toml = "0.8"

# Logging
log = "0.4"
env_logger = "0.11"

# UUID for terminal instance IDs
uuid = { version = "1", features = ["v4"] }
tauri-plugin-process = "2.3.1"
tauri-plugin-dialog = "2.7.0"

# Error handling
thiserror = "2"
