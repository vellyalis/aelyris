[package]
name = "aether-terminal"
version = "0.1.0"
description = "Windows-native AI workspace terminal"
authors = ["vellyalis"]
edition = "2021"

[lib]
name = "aether_terminal_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# Tauri core
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime
tokio = { version = "1", features = ["full"] }

# PTY (terminal backend)
portable-pty = "0.8"

# Git operations
git2 = "0.19"

# Config
toml = "0.8"

# Logging
log = "0.4"
env_logger = "0.11"

# UUID for terminal instance IDs
uuid = { version = "1", features = ["v4"] }
tauri-plugin-process = "2.3.1"
tauri-plugin-dialog = "2.7.0"

# Error handling
thiserror = "2"

# Database
rusqlite = { version = "0.31", features = ["bundled"] }

# YAML workflow definitions
serde_yaml = "0.9"

# File system watching
notify = { version = "7", features = ["macos_kqueue"] }
notify-debouncer-mini = "0.5"

# Window effects: Mica/Acrylic via tauri.conf.json windowEffects (no external crate needed)

# --- GPU terminal renderer (wgpu) ---
# GPU rendering
wgpu = "25"
# VTE parser (ANSI escape sequence state machine)
vte = "0.13"
# Font rasterization (CPU → bitmap)
fontdue = "0.9"
# Unicode character width (CJK full-width detection)
unicode-width = "0.2"
# Byte casting for GPU buffers
bytemuck = { version = "1", features = ["derive"] }
# Win32 API for Child HWND creation
[target.'cfg(windows)'.dependencies.windows]
version = "0.61"
features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Input_Ime",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_Dwm",
    "Win32_System_LibraryLoader",
]
# Raw window handle interop (Tauri ↔ wgpu)
raw-window-handle = "0.6"
